services:
  stockinfo:
    build: .
    image: stockinfo
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Im Container feste Werte — überschreiben ggf. .env
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_PATH: /data/stockinfo.db
    volumes:
      - stockinfo-data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        # Browser ruft das Backend über den vom Host veröffentlichten Port auf
        VITE_API_BASE_URL: http://localhost:${PORT:-8000}
    image: stockinfo-dashboard
    ports:
      - "5173:80"
    depends_on:
      - stockinfo
    restart: unless-stopped

volumes:
  stockinfo-data:
