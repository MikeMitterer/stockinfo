<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="ml" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#812c7c"/>
      <stop offset="1" stop-color="#df5430"/>
    </linearGradient>
  </defs>
  <!-- Marken-Kachel -->
  <rect x="2" y="2" width="44" height="44" rx="11" fill="url(#ml)"/>
  <!-- Candlestick-Balken (dezent) -->
  <g fill="#ffffff" opacity="0.22">
    <rect x="10.5" y="26" width="5" height="11" rx="1.5"/>
    <rect x="20.5" y="21" width="5" height="16" rx="1.5"/>
    <rect x="30.5" y="15" width="5" height="22" rx="1.5"/>
  </g>
  <!-- Aufwärts-Trendlinie -->
  <polyline points="10,33 18,27 26,24 34,15" fill="none" stroke="#ffffff"
            stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pfeilspitze (nach oben-rechts) -->
  <path d="M34 15 L28 15 M34 15 L34 21" fill="none" stroke="#ffffff"
        stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Datenpunkte -->
  <g fill="#ffffff">
    <circle cx="10" cy="33" r="1.9"/>
    <circle cx="18" cy="27" r="1.9"/>
    <circle cx="26" cy="24" r="1.9"/>
  </g>
</svg>
